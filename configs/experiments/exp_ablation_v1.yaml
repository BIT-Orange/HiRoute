      "full_hiroute": "configs/baselines/full_hiroute.yaml"
    }
  },
  "inputs": {
    "objects_csv": "data/processed/ndnsim/objects_master.csv",
    "queries_csv": "data/processed/ndnsim/queries_master.csv",
